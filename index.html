<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Vẻ đẹp thiên nhiên</title>
    <style>
        body {
            font-family: Arial;
            background-color: #e6f2e6;
            margin: 0;
        }
        header {
            background-color: #2e8b57;
            color: white;
            padding: 20px;
            text-align: center;
        }
        section {
            padding: 20px;
        }
        img {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
        }
        .card {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
    </style>
</head>
<body>

<header>
    <h1>Khám phá vẻ đẹp thiên nhiên</h1>
    <p>Thiên nhiên luôn mang đến sự bình yên và kỳ diệu</p>
</header>

<section>
    <div class="card">
        <h2>Rừng xanh</h2>
        <img src="https://source.unsplash.com/600x400/?forest" alt="Rừng">
        <p>Rừng là lá phổi xanh của Trái Đất, mang lại không khí trong lành.</p>
    </div>

    <div class="card">
        <h2>Biển cả</h2>
        <img src="https://source.unsplash.com/600x400/?ocean" alt="Biển">
        <p>Biển mang vẻ đẹp bao la và tiếng sóng dịu êm.</p>
    </div>

    <div class="card">
        <h2>Núi non</h2>
        <img src="https://source.unsplash.com/600x400/?mountain" alt="Núi">
        <p>Núi tượng trưng cho sự hùng vĩ và kiên cường.</p>
    </div>
</section>

</body>
</html>
